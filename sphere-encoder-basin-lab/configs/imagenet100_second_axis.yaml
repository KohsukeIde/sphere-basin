experiment:
  name: imagenet100_second_axis
  dist_mode: local
  dev_dir: workspace
  tag: second-axis
  skip_existing: true
  retry_attempts: 3
  gpu_groups:
    - [0, 1]

dataset:
  source_root: /home/cvrt/Desktop/dev/10Y_VSSL/data/ImageNet
  dataset_name: imagenet-100
  image_size: 160
  class_list_path: references/imagenet100_cmc.txt
  fid_stats_mode: extr
  fid_stats_batch_size: 64
  fid_stats_cuda: true

train:
  dataset_name: imagenet-100
  image_size: 160
  warmup_epochs: 3
  epochs: 25
  compression_ratio: 1.5
  vit_enc_model_size: small
  vit_dec_model_size: small
  vit_enc_latent_mlp_mixer_depth: 2
  vit_dec_latent_mlp_mixer_depth: 2
  affine_latent_mlp_mixer: true
  pixel_head_type: conv
  compile_model: false
  ckpt_save_interval: 5
  vis_interval: 25
  out_dir: experiments
  lat_con_loss_weight: 0.1
  pix_recon_dist_loss_weight: 1.0
  pix_recon_perc_loss_weight: 1.0
  pix_con_dist_loss_weight: 0.5
  pix_con_perc_loss_weight: 0.5
  batch_size: 32
  batch_size_per_rank: 16
  num_workers: 8
  use_wandb: true
  wandb_mode: online
  wandb_project: sphere-encoder-basin-lab
  wandb_group: imagenet100_second_axis
  fixed_vis_batch_size: 16
  probe_interval: 25
  probe_batch_size_per_rank: 8
  probe_num_prior_samples: 1024
  probe_num_data_samples: 1024
  probe_forward_steps: [1, 4]
  probe_taus_deg: [5.0, 10.0, 20.0, 30.0, 45.0, 60.0]
  probe_contraction_noise_scalers: [0.25, 0.5, 0.75, 1.0]
  probe_target_tau_deg: 30.0
  probe_target_noise_scaler: 1.0
  recon_eval_interval: 25
  recon_num_samples: 512
  light_eval_interval: 25
  light_eval_num_samples: 1024
  light_eval_batch_size_per_rank: 8
  light_eval_forward_steps: [1, 4]
  light_eval_num_snapshot_samples: 32

jobs:
  - name: a83_pilot
    alpha: 83
    target_job: sphere-small-small-imagenet-100-160px-a83-second-axis
  - name: a85_pilot
    alpha: 85
    target_job: sphere-small-small-imagenet-100-160px-a85-second-axis

canonical:
  cfg: 1.0
  cfg_position: combo
  seed: 0
  taus_deg: [5.0, 10.0, 20.0, 30.0, 45.0, 60.0]
  forward_steps: [1, 4]
  num_prior_samples: 2048
  num_data_samples: 2048
  batch_size_per_rank: 8
  contraction_noise_scalers: [0.25, 0.5, 0.75, 1.0]
  num_workers: 4
  use_ema_model: false
  phase_ckpt_epoch: ep0024
  phase_regime_name: shared-fixed
  phase_forward_steps: 4
  phase_tau_deg: 60.0

official_eval:
  forward_steps: [4]
  report_fid: [gfid]
  fid_stats_used_from: extr
  use_cfg: false
  cfg_min: 1.0
  cfg_max: 1.0
  cfg_position: combo
  rm_folder_after_eval: true
  num_eval_samples: 10000
  batch_size_per_rank: 8
  use_ema_model: false
