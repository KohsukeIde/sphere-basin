experiment:
  name: cifar10_loss_ablation
  dist_mode: local
  dev_dir: workspace
  tag: ablation
  skip_existing: true
  gpu_groups:
    - [0]
    - [1]
train:
  dataset_name: cifar-10
  image_size: 32
  warmup_epochs: 10
  epochs: 750
  compression_ratio: 1.5
  noise_sigma_max_angle: 85
  vit_enc_model_size: base
  vit_dec_model_size: base
  vit_enc_latent_mlp_mixer_depth: 2
  vit_dec_latent_mlp_mixer_depth: 2
  affine_latent_mlp_mixer: true
  pixel_head_type: conv
  compile_model: false
  ckpt_save_interval: 75
  vis_interval: 25
  out_dir: experiments
  batch_size_per_rank: 16
  num_workers: 8
  use_wandb: true
  wandb_mode: online
  wandb_project: sphere-encoder-basin-lab
  wandb_group: cifar10_loss_ablation
  fixed_vis_batch_size: 16
  probe_interval: 75
  probe_batch_size_per_rank: 64
  probe_num_prior_samples: 4096
  probe_num_data_samples: 4096
  probe_forward_steps: [1, 4]
  probe_taus_deg: [2.0]
  probe_contraction_noise_scalers: [0.25, 0.5, 0.75, 1.0]
  probe_target_tau_deg: 2.0
  probe_target_noise_scaler: 1.0
  recon_eval_interval: 75
  recon_num_samples: 2048
  light_eval_interval: 75
  light_eval_num_samples: 2560
  light_eval_batch_size_per_rank: 64
  light_eval_forward_steps: [1, 4]
  light_eval_num_snapshot_samples: 64
variants:
  full:
    lat_con_loss_weight: 0.1
    pix_recon_dist_loss_weight: 1.0
    pix_recon_perc_loss_weight: 1.0
    pix_con_dist_loss_weight: 0.5
    pix_con_perc_loss_weight: 0.5
  no_lat_con:
    lat_con_loss_weight: 0.0
    pix_recon_dist_loss_weight: 1.0
    pix_recon_perc_loss_weight: 1.0
    pix_con_dist_loss_weight: 0.5
    pix_con_perc_loss_weight: 0.5
  no_pix_con:
    lat_con_loss_weight: 0.1
    pix_recon_dist_loss_weight: 1.0
    pix_recon_perc_loss_weight: 1.0
    pix_con_dist_loss_weight: 0.0
    pix_con_perc_loss_weight: 0.0
  recon_only:
    lat_con_loss_weight: 0.0
    pix_recon_dist_loss_weight: 1.0
    pix_recon_perc_loss_weight: 1.0
    pix_con_dist_loss_weight: 0.0
    pix_con_perc_loss_weight: 0.0
analysis:
  gpu_groups:
    - [0]
    - [1]
  eval_forward_steps: [1, 4]
  report_fid: [rfid, gfid]
  num_eval_samples: 10000
  probe_forward_steps: [1, 4]
  num_prior_samples: 4096
  num_data_samples: 4096
  probe_batch_size_per_rank: 64
  contraction_noise_scalers: [0.25, 0.5, 0.75, 1.0]
  rm_folder_after_eval: true
  plot_forward_steps: 4
  plot_tau_deg: 2.0
