experiment:
  name: imagenet100_consistency_followup
  dist_mode: local
  dev_dir: workspace
  tag: followup
  skip_existing: true
  retry_attempts: 3
  gpu_groups:
  - - 0
    - 1
train:
  dataset_name: imagenet-100
  image_size: 160
  warmup_epochs: 3
  epochs: 25
  compression_ratio: 1.5
  noise_sigma_max_angle: 85
  vit_enc_model_size: small
  vit_dec_model_size: small
  vit_enc_latent_mlp_mixer_depth: 2
  vit_dec_latent_mlp_mixer_depth: 2
  affine_latent_mlp_mixer: true
  pixel_head_type: conv
  compile_model: false
  ckpt_save_interval: 1
  vis_interval: 25
  out_dir: experiments
  batch_size_per_rank: 16
  num_workers: 8
  use_wandb: true
  wandb_mode: online
  wandb_project: sphere-encoder-basin-lab
  wandb_group: imagenet100_followup
  fixed_vis_batch_size: 16
  probe_interval: 25
  probe_batch_size_per_rank: 8
  probe_num_prior_samples: 1024
  probe_num_data_samples: 1024
  probe_forward_steps:
  - 1
  - 4
  probe_taus_deg:
  - 5.0
  - 10.0
  - 20.0
  - 30.0
  - 45.0
  - 60.0
  probe_contraction_noise_scalers:
  - 0.25
  - 0.5
  - 0.75
  - 1.0
  probe_target_tau_deg: 30.0
  probe_target_noise_scaler: 1.0
  recon_eval_interval: 25
  recon_num_samples: 512
  light_eval_interval: 25
  light_eval_num_samples: 1200
  light_eval_batch_size_per_rank: 8
  light_eval_forward_steps:
  - 1
  - 4
  light_eval_num_snapshot_samples: 32
variants:
  no_pix_con:
    lat_con_loss_weight: 0.1
    pix_recon_dist_loss_weight: 1.0
    pix_recon_perc_loss_weight: 1.0
    pix_con_dist_loss_weight: 0.0
    pix_con_perc_loss_weight: 0.0
